server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000

app:
  # REST-mode: URL used by UserServiceClient for synchronous profile creation calls
  services:
    user-service:
      base-url: ${USER_SERVICE_URL:http://localhost:8082}

jwt:
  issuer: ecommerce-auth-service
  secret: mySuperSecretJwtKey12345678901234567890
  access-token-expiration-minutes: 15
  refresh-token-expiration-days: 7

logging:
  level:
    root: INFO
    com.ecommerce.authservice: DEBUG
    org.springframework.security: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.netflix: WARN
    io.micrometer: WARN
  # logback-spring.xml handles pattern and file rolling
  # Set LOG_FILE env var to override log directory (default: ./logs/auth-service.log)
